<!doctype html>
<!-- =========================================================
Nombre completo: coordi.html
Ruta o ubicación: /Requisitos/Coordi/coordi.html
Función o funciones:
- Mostrar únicamente los filtros de Coordi.
- Presentar indicadores compactos del corte seleccionado.
- Mostrar el correo global o la comunicación por requisito.
========================================================= -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coordi</title>
  <link rel="stylesheet" href="coordi.css" />
</head>
<body>
  <main class="coordi-app">
    <section id="coordi-status" class="coordi-status" hidden></section>

    <section class="coordi-filters" aria-label="Filtros de comunicación">
      <label>Período
        <select id="coordi-periodo"><option value="">Seleccione período</option></select>
      </label>
      <label>División
        <select id="coordi-division"><option value="">Todas</option></select>
      </label>
      <label>Carrera
        <select id="coordi-carrera"><option value="">Todas</option></select>
      </label>
      <label>Requisito
        <select id="coordi-requisito"><option value="">Todos los requisitos</option></select>
      </label>
    </section>

    <section id="coordi-empty" class="coordi-empty-state">
      Seleccione un período para preparar el correo global.
    </section>

    <section id="coordi-summary" class="coordi-kpis" aria-label="Resumen del corte" hidden>
      <article><span>Revisados</span><strong id="coordi-total">0</strong></article>
      <article><span>Con pendientes</span><strong id="coordi-alta">0</strong></article>
      <article><span>Áreas</span><strong id="coordi-media">0</strong></article>
      <article><span>Pendientes</span><strong id="coordi-baja">0</strong></article>
      <article><span>Carreras</span><strong id="coordi-carreras-total">0</strong></article>
    </section>

    <section id="coordi-communication" class="coordi-communication" hidden>
      <header class="coordi-communication-head">
        <div>
          <p class="coordi-eyebrow">Comunicación preparada</p>
          <h2 id="coordi-communication-title">Correo global</h2>
          <p id="coordi-communication-subtitle"></p>
          <div class="coordi-recipient">
            <strong id="coordi-recipient-name"></strong>
            <span id="coordi-recipient-contact"></span>
          </div>
        </div>
        <div class="coordi-actions">
          <button id="coordi-open-mail" type="button" class="btn-primary">Abrir en Outlook</button>
          <button id="coordi-open-whatsapp" type="button" class="btn-secondary" hidden>Abrir WhatsApp</button>
        </div>
      </header>

      <div class="coordi-preview-grid">
        <article class="coordi-preview-card">
          <div class="coordi-preview-title">
            <span>Vista previa del correo</span>
            <strong id="coordi-mail-subject"></strong>
          </div>
          <div id="coordi-email-preview" class="coordi-email-preview"></div>
        </article>

        <article id="coordi-whatsapp-wrap" class="coordi-preview-card coordi-whatsapp-card" hidden>
          <div class="coordi-preview-title">
            <span>Vista previa de WhatsApp</span>
          </div>
          <pre id="coordi-whatsapp-preview"></pre>
        </article>
      </div>
    </section>
  </main>

  <script src="../BDLocal/adapters/bdl.screen-deps.js"></script>
  <script src="../BDLocal/adapters/bdl.divisiones.fast-cache.js"></script>
  <script src="../Stats/stats.rules.js"></script>
  <script src="coo.config.js"></script>
  <script src="coo.data.js"></script>
  <script src="coo.report.js"></script>
  <script src="coo.render.js"></script>
  <script src="coo.mail.js"></script>
  <script src="coo.whatsapp.js"></script>
  <script src="coordi.app.js"></script>
</body>
</html>
