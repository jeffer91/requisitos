<!doctype html>
<!-- =========================================================
Nombre completo: repo.html
Ruta o ubicación: /Requisitos/Reportes/repo.html
Función o funciones:
- Generar reportes rápidos del módulo Carga usando BDLocal.
- Mostrar resumen general, carreras, requisitos y estudiantes pendientes.
- Filtrar por período, división, matrícula y carrera.
- Mostrar activos por defecto y permitir reportar retirados.
- Usar divisiones configuradas rápidas.
Con qué se conecta:
- ../BDLocal/adapters/bdl.screen-deps.js
- ../BDLocal/adapters/bdl.divisiones.fast-cache.js
- repo.css
- repo.core.js
- repo.export.js
- repo.app.js
========================================================= -->
<html lang="es"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title></title><link rel="stylesheet" href="repo.css" /></head><body>
<main class="repo-app"><section id="repo-status" class="repo-status">Cargando reportes...</section><section class="repo-tools"><label>Tipo de reporte<select id="repo-tipo"><option value="general">General</option><option value="carreras">Por carreras</option><option value="requisitos">Por requisitos</option><option value="pendientes">Pendientes críticos</option></select></label><label>Período<select id="repo-periodo"><option value="">Todos</option></select></label><label>División<select id="repo-division"><option value="">Todas</option></select></label><label>Matrícula<select id="repo-matricula"><option value="ACTIVO">Activos</option><option value="RETIRADO">Retirados</option><option value="">Todos</option></select></label><label>Carrera<select id="repo-carrera"><option value="">Todas</option></select></label><button id="repo-refresh" type="button">Actualizar</button><button id="repo-copy" type="button">Copiar</button><button id="repo-print" type="button">Imprimir</button></section><section class="repo-kpis"><article><span>Total estudiantes</span><strong id="repo-total">0</strong></article><article><span>Cumplen todo</span><strong id="repo-ok">0</strong></article><article><span>Con pendientes</span><strong id="repo-pend">0</strong></article><article><span>No cumplen</span><strong id="repo-no">0</strong></article><article><span>Avance</span><strong id="repo-avance">0%</strong></article></section><section class="repo-grid"><article class="repo-card repo-preview-card"><div class="repo-card-head"><h2>Reporte generado</h2><span id="repo-generated-at">—</span></div><textarea id="repo-preview" readonly></textarea><div class="repo-actions"><button id="repo-export-txt" type="button">Exportar TXT</button><button id="repo-export-html" type="button">Exportar HTML</button><button id="repo-export-json" type="button">Exportar JSON</button></div></article><article class="repo-card"><div class="repo-card-head"><h2>Resumen por carreras</h2><span id="repo-carreras-meta">0 carreras</span></div><div id="repo-carreras" class="repo-table-wrap"></div></article></section><section class="repo-grid"><article class="repo-card"><div class="repo-card-head"><h2>Resumen por requisitos</h2><span>Mayor atención primero</span></div><div id="repo-requisitos" class="repo-table-wrap"></div></article><article class="repo-card"><div class="repo-card-head"><h2>Estudiantes pendientes</h2><span id="repo-estudiantes-meta">0 estudiantes</span></div><div id="repo-estudiantes" class="repo-table-wrap tall"></div></article></section><section class="repo-card"><div class="repo-card-head"><h2>Diagnóstico del reporte</h2><span>BDLocal</span></div><pre id="repo-diagnostics"></pre></section></main>
<script src="../BDLocal/adapters/bdl.screen-deps.js"></script><script src="../BDLocal/adapters/bdl.divisiones.fast-cache.js"></script><script src="repo.core.js"></script><script src="repo.export.js"></script><script src="repo.app.js"></script></body></html>
