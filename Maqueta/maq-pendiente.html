<!doctype html>
<!-- =========================================================
Nombre completo: maq-pendiente.html
Ruta o ubicación: /Requisitos/Maqueta/maq-pendiente.html
Función o funciones:
- Mostrar pantalla segura cuando un módulo del menú todavía no está recuperado.
- Evitar errores de archivo no encontrado dentro de Electron.
Con qué se conecta:
- maq-core.js
========================================================= -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="maq-ui.css" />
</head>
<body>
  <main class="maq-pending-page">
    <section class="maq-pending-card">
      <h1 id="pending-title">Módulo pendiente</h1>
      <p>Esta pantalla ya está en el menú, pero su carpeta se recuperará en un bloque posterior. Así evitamos que Electron muestre una pantalla rota o vacía.</p>
      <code id="pending-path"></code>
    </section>
  </main>
  <script>
    (function(){
      var q=new URLSearchParams(location.search);
      var name=q.get("name")||"Módulo pendiente";
      var path=q.get("path")||"Ruta no definida";
      document.getElementById("pending-title").textContent=name;
      document.getElementById("pending-path").textContent=path;
    })();
  </script>
</body>
</html>
