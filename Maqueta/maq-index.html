<!DOCTYPE html>
<!-- =========================================================
Nombre completo: maq-index.html
Ruta o ubicación: /Maqueta/maq-index.html
Función o funciones:
- Ser la entrada interna del módulo Requisitos.
- Mostrar menú superior fijo, claro y rápido.
- Abrir Carga por defecto.
- Preparar Base Local solo cuando una pantalla la necesita.
- Mantener Firebase automático pausado.
- Mantener pantallas en memoria mediante iframes.
- Cargar el registro de módulos antes de cualquier puente local.
- Evitar navegaciones heredadas fuera de la aplicación.
========================================================= -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Requisitos</title>
  <link rel="stylesheet" href="maq-ui.css" />
</head>
<body>
  <div class="maq-shell">
    <header class="maq-topbar">
      <div class="maq-brand" aria-label="Requisitos">
        <span class="maq-brand-badge">R</span>
        <span class="maq-brand-text">Requisitos</span>
      </div>
      <nav id="maq-main-menu" class="maq-menu" aria-label="Menú superior de Requisitos"></nav>
      <div class="maq-actions">
        <button id="maq-btn-refresh" class="maq-btn maq-btn-primary" type="button" title="Refrescar pantalla activa">Refrescar</button>
      </div>
    </header>
    <main class="maq-main">
      <section id="maq-main-frame-host" class="maq-frame-host" aria-label="Pantallas de Requisitos"></section>
    </main>
    <footer class="maq-statusbar">
      <span id="maq-status-text">Listo</span>
      <span id="maq-memory-text">Memoria activa</span>
    </footer>
  </div>
  <script src="maq-utils.js"></script>
  <script src="maq-baselocal-session.js"></script>
  <script src="maq-modulos-registry.js"></script>
  <script src="maq-config-service.js"></script>
  <script src="maq-core.js"></script>
  <script src="maq-menu.js"></script>
  <script src="maq-health.js"></script>
  <script src="maq-baselocal-background-sync.js"></script>
</body>
</html>
