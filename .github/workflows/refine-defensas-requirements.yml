name: Refine Defensas requirements

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/refine-defensas-requirements.yml"

permissions:
  contents: write

jobs:
  refine:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Clear Defart service cache after reload
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('BDLocal/conexiones/cone.defensas.js')
          text = path.read_text(encoding='utf-8')

          old = '''  function renderDefensas(){
              try{
                if (
                  window.DefartCore &&'''

          new = '''  function renderDefensas(){
              try{
                if (
                  window.DefartServiceBridge &&
                  typeof window.DefartServiceBridge.clear === "function"
                ){
                  window.DefartServiceBridge.clear({
                    resetPage: false
                  });
                }
              }catch(error){}

              try{
                if (
                  window.DefartCore &&'''

          if old not in text:
              raise RuntimeError('renderDefensas marker not found')

          text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate file
        run: |
          node --check BDLocal/conexiones/cone.defensas.js
          grep -q 'DefartServiceBridge.clear' BDLocal/conexiones/cone.defensas.js
          git diff --check

      - name: Commit refinement
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/refine-defensas-requirements.yml
          git add BDLocal/conexiones/cone.defensas.js .github/workflows/refine-defensas-requirements.yml
          git diff --cached --check
          git commit -m "Actualiza caché de requisitos en Defensas"
          git push origin HEAD:${{ github.head_ref }}
