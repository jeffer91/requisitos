name: Apply Global main fix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-global-main-fix.yml"

permissions:
  contents: write

concurrency:
  group: apply-global-main-fix
  cancel-in-progress: false

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply audited Global corrections
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main

          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          ROOT = Path('.')

          def block(value):
              return textwrap.dedent(value).strip('\n')

          def read(path):
              return (ROOT / path).read_text(encoding='utf-8')

          def write(path, value):
              (ROOT / path).write_text(value, encoding='utf-8')

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: se esperaba 1 coincidencia y se encontraron {count}')
              return text.replace(old, new, 1)

          def sub_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f'{label}: se esperaba 1 coincidencia y se encontraron {count}')
              return updated

