          text = read(path)
          text = sub_once(
              text,
              r'\n\s*<button\s+type="button"\s+class="global-btn global-btn-light"\s+id="globalBtnActualizar"\s*>\s*Actualizar datos\s*</button>\s*',
              '\n',
              'html quitar actualizar',
