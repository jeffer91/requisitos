                      toValue !== null &&
                      fromValue > toValue
                    ){
                      var swap = fromValue;
                      fromValue = toValue;
                      toValue = swap;
                    }

                    if(
                      rowValue !== null &&
                      fromValue !== null &&
                      rowValue < fromValue
