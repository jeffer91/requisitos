name: Ficha Fast Check

on:
  pull_request:
    paths:
      - "Ficha/**"
      - "InPVC/frontend/inpvc.bootstrap.js"
      - "BDLocal/conexiones/cone.ficha*.js"
      - "BDLocal/adapters/bdl.screen-deps.js"
      - "scripts/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/ficha-fast-check.yml"

permissions:
  contents: read

jobs:
  ficha:
    name: Ficha static and wiring check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Syntax
        shell: bash
        run: |
          set -euo pipefail
          node --check Ficha/ficha.connection-bridge.js
          node --check Ficha/ficha.bootstrap.js
          node --check Ficha/ficha.core.js
          node --check Ficha/ficha.app.js
          node --check Ficha/ficha.periodo-normalizer.js
          node --check Ficha/ficha.modalidad.js
          node --check Ficha/ficha.modalidad-ui.js
          node --check Ficha/ficha.matricula.js
          node --check BDLocal/conexiones/cone.ficha.js
          node --check BDLocal/conexiones/cone.ficha.enrollment-lock.js
          node --check InPVC/frontend/inpvc.bootstrap.js
      - name: Run static contracts
        shell: bash
        run: |
          set +e
          node scripts/verify-bdlocal.js > verify-bdlocal.log 2>&1
          echo $? > verify-bdlocal.exit
          node scripts/verify-main-menu.js > verify-main-menu.log 2>&1
          echo $? > verify-main-menu.exit
          node scripts/verify-ficha-editors.js > verify-ficha-editors.log 2>&1
          echo $? > verify-ficha-editors.exit
          node scripts/verify-screen-connections.js > verify-screen-connections.log 2>&1
          echo $? > verify-screen-connections.exit
          node scripts/audit-repository.js > audit-repository.log 2>&1
          echo $? > audit-repository.exit
          exit 0
      - name: Paths and legacy references
        shell: bash
        run: |
          set -euo pipefail
          test -f Ficha/ficha.css
          test -f Ficha/ficha.compact.css
          test -f Ficha/ficha.bootstrap.js
          test -f BDLocal/adapters/bdl.screen-deps.js
          test -f BDLocal/conexiones/cone.ficha.js
          test -f BDLocal/conexiones/cone.ficha.enrollment-lock.js
          ! grep -E "backup_|anterior_|dañado_|\.bak" Ficha/ficha.html Ficha/ficha.bootstrap.js Ficha/ficha.connection-bridge.js
          ! grep -q 'id="ficha-btn-refresh"' Ficha/ficha.html
      - name: Upload static diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ficha-static-diagnostics
          path: |
            *.log
            *.exit
          if-no-files-found: error
          retention-days: 1
      - name: Enforce static contracts
        shell: bash
        run: |
          set -euo pipefail
          failed=0
          for file in *.exit; do
            code="$(cat "$file")"
            if [ "$code" != "0" ]; then
              echo "$file failed with $code"
              failed=1
            fi
          done
          exit "$failed"
