name: Apply corrected Tabla patch

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/debug-tabla-patch.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract and apply flexible patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          source = Path('.github/workflows/apply-tabla-requisitos-orden.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = textwrap.dedent(source[start:end])

          old_helper = '''def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 exact match, found {count}")
              return text.replace(old, new, 1)'''

          new_helper = '''def replace_once(text, old, new, label):
              old = textwrap.dedent(old).strip("\\n")
              new = textwrap.dedent(new).strip("\\n")
              tokens = [item for item in re.split(r"\\s+", old.strip()) if item]
              pattern = r"\\s+".join(re.escape(item) for item in tokens)
              matches = list(re.finditer(pattern, text, flags=re.S))
              if len(matches) != 1:
                  raise RuntimeError(f"{label}: expected 1 flexible match, found {len(matches)}")
              match = matches[0]
              return text[:match.start()] + new + text[match.end():]'''

          old_regex_helper = '''def regex_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 regex match, found {count}")
              return updated'''

          new_regex_helper = '''def regex_once(text, pattern, replacement, label):
              updated, count = re.subn(
                  pattern,
                  lambda match: replacement,
                  text,
                  count=1,
                  flags=re.S
              )
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 regex match, found {count}")
              return updated'''

          if old_helper not in script:
              raise RuntimeError('No se encontró el helper original replace_once')
          if old_regex_helper not in script:
              raise RuntimeError('No se encontró el helper original regex_once')

          script = script.replace(old_helper, new_helper, 1)
          script = script.replace(old_regex_helper, new_regex_helper, 1)
          Path('/tmp/patch_tabla.py').write_text(script, encoding='utf-8')
          PY

          set +e
          python /tmp/patch_tabla.py > /tmp/tabla-patch.log 2>&1
          code=$?
          set -e

          if [ "$code" -ne 0 ]; then
            cp /tmp/tabla-patch.log tabla-patch-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tabla-patch-error.txt
            git commit -m "Actualiza diagnóstico del parche de Tabla"
            git push origin HEAD:${{ github.head_ref }}
            cat /tmp/tabla-patch.log
            exit "$code"
          fi

      - name: Validate final Tabla files
        shell: bash
        run: |
          node --check BDLocal/conexiones/cone.tabla.js
          node --check Gestion/Tabla/data/tabla.data-source.js
          node --check Gestion/Tabla/data/tabla.data-guard.js
          node --check Gestion/Tabla/data/tabla.data-normalizer.js
          node --check Gestion/Tabla/core/tabla.constants.js
          node --check Gestion/Tabla/ui/tabla.render-controls.js
          node --check Gestion/Tabla/core/tabla.app.js
          node --check Gestion/Tabla/ui/tabla.render-table.js
          node --check Gestion/Tabla/communication/tabla.actions.js

          grep -q 'id="tabla-sort-requirements"' Gestion/Tabla/tabla.html
          grep -q 'Más faltantes' Gestion/Tabla/ui/tabla.render-controls.js
          grep -q '<th>Requisitos</th>' Gestion/Tabla/ui/tabla.render-table.js
          grep -q 'tabla-req-badge--missing' Gestion/Tabla/css/tabla.table.css
          grep -q 'requirementOrder' Gestion/Tabla/core/tabla.app.js
          git diff --check

      - name: Commit corrected files and clean temporary files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f tabla-patch-error.txt
          rm -f .github/workflows/apply-tabla-requisitos-orden.yml
          rm -f .github/workflows/debug-tabla-patch.yml
          git add \
            BDLocal/conexiones/cone.tabla.js \
            Gestion/Tabla/data/tabla.data-source.js \
            Gestion/Tabla/data/tabla.data-guard.js \
            Gestion/Tabla/data/tabla.data-normalizer.js \
            Gestion/Tabla/core/tabla.constants.js \
            Gestion/Tabla/tabla.html \
            Gestion/Tabla/ui/tabla.render-controls.js \
            Gestion/Tabla/core/tabla.app.js \
            Gestion/Tabla/ui/tabla.render-table.js \
            Gestion/Tabla/communication/tabla.actions.js \
            Gestion/Tabla/css/tabla.table.css \
            tabla-patch-error.txt \
            .github/workflows/apply-tabla-requisitos-orden.yml \
            .github/workflows/debug-tabla-patch.yml
          git diff --cached --check
          git commit -m "Depura Tabla y agrega orden por requisitos"
          git push origin HEAD:${{ github.head_ref }}
