name: Debug Tabla patch

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/debug-tabla-patch.yml"

permissions:
  contents: write

jobs:
  debug:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract and diagnose prepared patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-tabla-requisitos-orden.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = textwrap.dedent(source[start:end])
          Path('/tmp/patch_tabla.py').write_text(script, encoding='utf-8')
          PY

          set +e
          python /tmp/patch_tabla.py > /tmp/tabla-patch.log 2>&1
          code=$?
          set -e

          if [ "$code" -ne 0 ]; then
            cp /tmp/tabla-patch.log tabla-patch-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tabla-patch-error.txt
            git commit -m "Registra diagnóstico del parche de Tabla"
            git push origin HEAD:${{ github.head_ref }}
            cat /tmp/tabla-patch.log
            exit "$code"
          fi

          echo "Patch completed successfully" > tabla-patch-error.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tabla-patch-error.txt
          git commit -m "Registra resultado del parche de Tabla"
          git push origin HEAD:${{ github.head_ref }}
