name: Refine Stats cache from PR

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/trigger-stats-fix.yml"

permissions:
  contents: write

jobs:
  refine:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Optimize Stats hydration scope
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          path = Path('BDLocal/conexiones/cone.stats.js')
          text = path.read_text(encoding='utf-8')

          replacement = textwrap.dedent('''
          function hydrationScope(options){
            options = options || {};

            var periodoId = canonicalPeriodId(
              options.periodoId ||
              options.periodId ||
              ""
            );

            var matricula =
              options.matricula !== undefined
                ? options.matricula
                : options.estadoMatricula;

            var matriculaKey =
              matricula === undefined || matricula === null
                ? "__default__"
                : text(matricula) || "__todas__";

            return {
              key:
                (periodoId || "__todos__") +
                "|" +
                normalizeKey(matriculaKey),
              periodoId: periodoId,
              matricula: matricula
            };
          }

          function hydratedStudentsForOptions(current, options){
            current = current || cache();
            options = options || {};
            ensureMemo(current);

            var scope = hydrationScope(options);

            if(
              Object.prototype.hasOwnProperty.call(
                memo.hydratedByPeriod,
                scope.key
              )
            ){
              return memo.hydratedByPeriod[scope.key];
            }

            var baseOptions = {
              periodoId: scope.periodoId,
              periodId: scope.periodoId
            };

            if(
              scope.matricula !== undefined &&
              scope.matricula !== null
            ){
              baseOptions.matricula = scope.matricula;
              baseOptions.estadoMatricula = scope.matricula;
            }

            var rawRows = U.filterStudents(
              current.students || [],
              baseOptions
            );

            var requirementsIndex =
              buildRequirementsIndex(current);

            var hydrated = rawRows.map(function(row){
              return hydrateStudent(row, requirementsIndex);
            });

            memo.hydratedByPeriod[scope.key] = hydrated;
            memo.hydratedStudents = hydrated;
            memo.hydratedStudentsToken = memo.token;

            return hydrated;
          }

          function students(options){
            options = options || {};

            var current = cache();
            var hydrated = hydratedStudentsForOptions(
              current,
              options
            );

            var filtered = U.filterStudents(
              hydrated,
              options
            );

            return filtered.map(copyHydratedStudent);
          }

          function requirements(options){
          ''').strip('\n')

          text, count = re.subn(
            r'function allHydratedStudents\(current\)\{.*?function requirements\(options\)\{',
            replacement,
            text,
            count=1,
            flags=re.S,
          )

          if count != 1:
            raise RuntimeError(f'hydration block: expected 1 match, found {count}')

          text = text.replace(
            '    var hydrated = allHydratedStudents(current);',
            '    var hydratedCount = Array.isArray(memo.hydratedStudents)\n      ? memo.hydratedStudents.length\n      : 0;',
            1,
          )
          text = text.replace(
            '      hydratedStudents: hydrated.length,',
            '      hydratedStudents: hydratedCount,',
            1,
          )

          if 'allHydratedStudents(' in text:
            raise RuntimeError('old allHydratedStudents reference remains')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate final Stats files
        run: |
          node --check BDLocal/conexiones/cone.stats.js
          node --check Stats/stats.core.js
          node --check Stats/stats.app.js
          git diff --check

      - name: Commit refinement and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/trigger-stats-fix.yml
          git add BDLocal/conexiones/cone.stats.js .github/workflows/trigger-stats-fix.yml
          git diff --cached --check
          git commit -m "Optimiza hidratación de Stats por período"
          git push origin HEAD:${{ github.head_ref }}
