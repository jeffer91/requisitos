name: Apply Stats fix from PR

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/trigger-stats-fix.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract and apply prepared Stats patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-stats-data-flow.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = textwrap.dedent(source[start:end])
          Path('/tmp/patch_stats.py').write_text(script, encoding='utf-8')
          PY

          python /tmp/patch_stats.py

      - name: Validate corrected files
        run: |
          node --check BDLocal/conexiones/cone.stats.js
          node --check Stats/stats.core.js
          node --check Stats/stats.app.js
          git diff --check

      - name: Commit corrected Stats files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/apply-stats-data-flow.yml
          rm -f .github/workflows/trigger-stats-fix.yml
          git add BDLocal/conexiones/cone.stats.js Stats/stats.core.js Stats/stats.app.js .github/workflows/apply-stats-data-flow.yml .github/workflows/trigger-stats-fix.yml
          git diff --cached --check
          git commit -m "Depura conexión y carga de Stats"
          git push origin HEAD:${{ github.head_ref }}
