# =========================================================
# Nombre completo: bdlocal-integrity.yml
# Ruta o ubicación: /.github/workflows/bdlocal-integrity.yml
# Función o funciones:
# - Ejecutar certificación y auditoría integral en cada cambio de main.
# - Validar sintaxis, dependencias, Electron, Firebase, XML y conexiones.
# - No instalar Electron ni conectarse a Firebase o Google Sheets.
# =========================================================
name: BDLocal Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-bdlocal:
    name: Verify BDLocal
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package.json

      - name: Run complete static audit
        run: npm test
