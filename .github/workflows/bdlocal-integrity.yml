# =========================================================
# Nombre completo: bdlocal-integrity.yml
# Ruta: /.github/workflows/bdlocal-integrity.yml
# Función:
# - Ejecutar npm test en cada cambio de main.
# - Ejecutar Electron e IndexedDB en un entorno aislado.
# - Publicar estados verificables sobre el commit evaluado.
# - Conservar los registros de ambas pruebas como artefactos.
# =========================================================
name: BDLocal Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  static-audit:
    name: Static audit
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Run complete static audit
        id: static_test
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          npm test > artifacts/npm-test.log 2>&1
          code=$?
          cat artifacts/npm-test.log
          echo "$code" > artifacts/npm-test.exit
          exit 0

      - name: Publish npm test status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let code = 1;
            try {
              code = Number(fs.readFileSync('artifacts/npm-test.exit', 'utf8').trim());
            } catch (error) {}
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: code === 0 ? 'success' : 'failure',
              context: 'requisitos/npm-test',
              description: code === 0
                ? 'Suite completa aprobada'
                : 'La suite completa tiene fallos'
            });

      - name: Upload npm test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: requisitos-npm-test
          path: |
            artifacts/npm-test.log
            artifacts/npm-test.exit
          if-no-files-found: error
          retention-days: 14

      - name: Enforce npm test result
        shell: bash
        run: |
          set -euo pipefail
          code="$(cat artifacts/npm-test.exit)"
          exit "$code"

  electron-smoke:
    name: Electron and IndexedDB smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 18
    needs: static-audit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Install pinned dependencies
        run: npm install --no-audit --no-fund

      - name: Prepare Electron binary and sandbox helper
        shell: bash
        run: |
          set -euo pipefail
          node node_modules/electron/install.js
          executable="$(node -p "require('electron')")"
          helper="$(dirname "$executable")/chrome-sandbox"
          test -x "$executable"
          test -f "$helper"
          sudo chown root:root "$helper"
          sudo chmod 4755 "$helper"
          stat -c '%U %G %a %n' "$helper"

      - name: Run isolated Electron test
        shell: bash
        run: |
          set +e
          mkdir -p artifacts
          xvfb-run --auto-servernum npm run test:electron > artifacts/bdlocal-electron-smoke.log 2>&1
          code=$?
          cat artifacts/bdlocal-electron-smoke.log
          echo "$code" > artifacts/bdlocal-electron-smoke.exit
          exit 0

      - name: Publish Electron status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let code = 1;
            try {
              code = Number(fs.readFileSync('artifacts/bdlocal-electron-smoke.exit', 'utf8').trim());
            } catch (error) {}
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: code === 0 ? 'success' : 'failure',
              context: 'requisitos/electron-smoke',
              description: code === 0
                ? 'Electron e IndexedDB aprobados'
                : 'Electron o IndexedDB tienen fallos'
            });

      - name: Upload Electron smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bdlocal-electron-smoke
          path: |
            artifacts/bdlocal-electron-smoke.json
            artifacts/bdlocal-electron-smoke.log
            artifacts/bdlocal-electron-smoke.exit
          if-no-files-found: error
          retention-days: 14

      - name: Enforce Electron smoke result
        shell: bash
        run: |
          set -euo pipefail
          code="$(cat artifacts/bdlocal-electron-smoke.exit)"
          exit "$code"
