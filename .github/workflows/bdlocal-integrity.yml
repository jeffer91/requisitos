# =========================================================
# Nombre completo: bdlocal-integrity.yml
# Ruta o ubicación: /.github/workflows/bdlocal-integrity.yml
# Función o funciones:
# - Ejecutar la certificación estática de BDLocal en cada cambio de main.
# - Validar sintaxis, colecciones Firebase, IDs, Telegram y mantenimiento.
# - No instalar Electron ni conectarse a Firebase.
# =========================================================
name: BDLocal Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-bdlocal:
    name: Verify BDLocal
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run BDLocal certification
        run: node scripts/verify-bdlocal.js
