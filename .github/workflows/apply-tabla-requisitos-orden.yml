name: Apply Tabla requirements and ordering fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/apply-tabla-requisitos-orden.yml"

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Patch Tabla
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          def dedent(value):
              return textwrap.dedent(value).strip("\n")

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 exact match, found {count}")
              return text.replace(old, new, 1)

          def regex_once(text, pattern, replacement, label):
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 regex match, found {count}")
              return updated

          # =====================================================
          # 1. BDLocal/conexiones/cone.tabla.js
          # =====================================================
          path = Path("BDLocal/conexiones/cone.tabla.js")
          text = path.read_text(encoding="utf-8")

          if '2.1.0-stable-envelope' not in text:
              text = replace_once(
                  text,
                  'var VERSION = "2.0.0-official-envelope";',
                  'var VERSION = "2.1.0-stable-envelope";',
                  "cone.tabla version",
              )

              text = replace_once(
                  text,
                  '''    var studentSource = text(meta.studentSource);
                    var requirementSource = text(meta.requirementSource);
                    var trustedStudents = studentSource === "BDLServiceEstudiantes";
                    var trustedRequirements = requirementSource === "BDLRepoRequisitos";''',
                  '''    var studentSource = text(meta.studentSource);
                    var requirementSource = text(meta.requirementSource);
                    var trustedStudents =
                      students.length > 0 &&
                      (
                        !studentSource ||
                        [
                          "BDLServiceEstudiantes",
                          "BL2Core.getStudents",
                          "BDLocalConexiones.cache.students"
                        ].indexOf(studentSource) >= 0
                      );
                    var trustedRequirements =
                      requirements.length > 0 &&
                      (
                        !requirementSource ||
                        [
                          "BDLRepoRequisitos",
                          "BL2Core.getRequirements",
                          "BDLocalConexiones.cache.requirements"
                        ].indexOf(requirementSource) >= 0
                      );''',
                  "cone.tabla trusted sources",
              )

              text = replace_once(
                  text,
                  '''      complete:
                        periods.length > 0 && students.length > 0 && requirements.length > 0 &&
                        invalidStudents === 0 && trustedStudents && trustedRequirements''',
                  '''      complete:
                        periods.length > 0 &&
                        students.length > 0 &&
                        requirements.length > 0 &&
                        invalidStudents === 0 &&
                        trustedStudents &&
                        trustedRequirements''',
                  "cone.tabla complete",
              )

              text = replace_once(
                  text,
                  '''        requirementsLinked: analysis.requirementsLinked,
                        studentsWithoutRequirements: analysis.studentsWithoutRequirements,''',
                  '''        requirementsLinked: analysis.requirementsLinked,
                        requirementsCoverageComplete:
                          analysis.studentsWithoutRequirements === 0 &&
                          analysis.orphanRequirements === 0,
                        studentsWithoutRequirements: analysis.studentsWithoutRequirements,''',
                  "cone.tabla coverage meta",
              )

              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 2. Gestion/Tabla/data/tabla.data-source.js
          # =====================================================
          path = Path("Gestion/Tabla/data/tabla.data-source.js")
          text = path.read_text(encoding="utf-8")

          if '3.2.0-single-envelope-read' not in text:
              text = replace_once(
                  text,
                  'var VERSION = "3.1.0-guarded-read-flow";',
                  'var VERSION = "3.2.0-single-envelope-read";',
                  "tabla.data-source version",
              )

              text = replace_once(
                  text,
                  '  function normalizeResponse(response){\n    response = object(response);',
                  '  function normalizeResponse(response, options){\n    response = object(response);\n    options = object(options);\n    var allowEmpty = options.allowEmpty === true;',
                  "tabla.data-source normalize signature",
              )

              text = replace_once(
                  text,
                  '''    if(!raw.periods.length){
                      throw new Error("ConTabla no entregó períodos.");
                    }

                    if(!raw.students.length){
                      throw new Error("ConTabla no entregó estudiantes.");
                    }

                    if(!raw.requirements.length){
                      throw new Error("ConTabla no entregó requisitos.");
                    }''',
                  '''    if(!allowEmpty && !raw.periods.length){
                      throw new Error("ConTabla no entregó períodos.");
                    }

                    if(!allowEmpty && !raw.students.length){
                      throw new Error("ConTabla no entregó estudiantes.");
                    }

                    if(!allowEmpty && !raw.requirements.length){
                      throw new Error("ConTabla no entregó requisitos.");
                    }''',
                  "tabla.data-source empty validation",
              )

              text = replace_once(
                  text,
                  '      .then(normalizeResponse)\n      .then(function(envelope){',
                  '''      .then(function(response){
                        return normalizeResponse(response, options);
                      })
                      .then(function(envelope){''',
                  "tabla.data-source normalize call",
              )

              refresh_replacement = dedent('''
              function refresh(options){
                options = Object.assign({
                  full: true,
                  immediate: true,
                  force: true,
                  source: "TablaDataSource.refresh"
                }, options || {});

                state.refreshes += 1;

                return loadClient()
                  .then(function(client){
                    if(!client || typeof client.refresh !== "function"){
                      throw new Error("BDLocalConnectionClient.refresh no está disponible.");
                    }

                    return client.refresh(SCREEN, options);
                  })
                  .then(function(response){
                    if(response && response.ok === false){
                      throw new Error(
                        text(response.error && response.error.message) ||
                        "No se pudo actualizar Tabla desde Base Local."
                      );
                    }

                    var envelope = normalizeResponse(response, {
                      allowEmpty:
                        options.allowEmpty === true ||
                        options.confirmedEmpty === true
                    });

                    state.envelope = envelope;
                    state.revision = Number(
                      envelope.revision ||
                      envelope.meta && envelope.meta.revision ||
                      0
                    );
                    state.updatedAt = now();
                    state.lastError = "";
                    state.reads += 1;

                    return guardedEnvelope({
                      allowEmpty:
                        options.allowEmpty === true ||
                        options.confirmedEmpty === true
                    });
                  })
                  .then(function(envelope){
                    return {
                      ok: true,
                      envelope: envelope,
                      revision: envelope.revision,
                      source: SOURCE
                    };
                  })
                  .catch(function(error){
                    state.failures += 1;
                    state.lastError = text(error && error.message || error);
                    throw error;
                  });
              }
              ''')

              text = regex_once(
                  text,
                  r'  function refresh\(options\)\{.*?\n  \}\n\n  function invalidate\(options\)\{',
                  refresh_replacement + '\n\n  function invalidate(options){',
                  "tabla.data-source refresh",
              )

              text = replace_once(
                  text,
                  '''    readPeriods: readPeriods,
                    listPeriods: readPeriods,
                    readStudents: readStudents,''',
                  '''    read: guardedEnvelope,
                    readPeriods: readPeriods,
                    listPeriods: readPeriods,
                    readStudents: readStudents,''',
                  "tabla.data-source export read",
              )

              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 3. Gestion/Tabla/data/tabla.data-guard.js
          # =====================================================
          path = Path("Gestion/Tabla/data/tabla.data-guard.js")
          text = path.read_text(encoding="utf-8")

          if '3.1.0-revision-aware-events' not in text:
              text = replace_once(
                  text,
                  'var VERSION = "3.0.0-atomic-envelope";',
                  'var VERSION = "3.1.0-revision-aware-events";',
                  "tabla.data-guard version",
              )

              text = replace_once(
                  text,
                  '''    requestTimer: null,
                    task: null,
                    stopBase: null''',
                  '''    requestTimer: null,
                    task: null,
                    stopBase: null,
                    lastEventRevision: 0,
                    lastEventAt: 0''',
                  "tabla.data-guard state",
              )

              schedule_replacement = dedent('''
              function scheduleCapture(reason, force, allowed){
                if(state.captureTimer){
                  window.clearTimeout(state.captureTimer);
                }

                state.captureTimer = window.setTimeout(function(){
                  state.captureTimer = null;

                  loadOfficial(reason || "base-event", {
                    refresh: force === true,
                    allowEmpty: allowed === true,
                    source:
                      force === true
                        ? "TablaDataGuard.scheduled-refresh"
                        : "TablaDataGuard.scheduled-read"
                  });
                }, Math.max(0, Number(C.delays && C.delays.guardCapture || 120)));
              }
              ''')

              text = regex_once(
                  text,
                  r'  function scheduleCapture\(reason, force, allowed\)\{.*?\n  \}\n\n  function refresh\(options\)\{',
                  schedule_replacement + '\n\n  function refresh(options){',
                  "tabla.data-guard scheduleCapture",
              )

              handle_replacement = dedent('''
              function handleBaseEvent(info){
                info = object(info);
                var detail = object(info.detail);
                var revision = Number(detail.revision || detail.cacheRevision || 0);
                var sourceScreen = text(
                  detail.sourceScreen ||
                  detail.screen ||
                  detail.source ||
                  ""
                ).toLowerCase();

                var allowEmpty =
                  detail.allowEmpty === true ||
                  detail.confirmedEmpty === true ||
                  detail.deletionConfirmed === true;

                if(sourceScreen.indexOf("tabla") >= 0){
                  return;
                }

                if(
                  revision > 0 &&
                  revision === state.lastEventRevision &&
                  Date.now() - state.lastEventAt < 800
                ){
                  return;
                }

                if(revision > 0){
                  state.lastEventRevision = revision;
                  state.lastEventAt = Date.now();
                }

                if(
                  revision > 0 &&
                  state.revision > 0 &&
                  revision <= state.revision
                ){
                  requestTabla(info.name || "base-event-current", lastGood);
                  return;
                }

                if(S && typeof S.invalidate === "function"){
                  S.invalidate({hard: true, source: info.name || "base-event"});
                }

                scheduleCapture(
                  info.name || "base-event",
                  false,
                  allowEmpty
                );
              }
              ''')

              text = regex_once(
                  text,
                  r'  function handleBaseEvent\(info\)\{.*?\n  \}\n\n  function clear\(\)\{',
                  handle_replacement + '\n\n  function clear(){',
                  "tabla.data-guard handleBaseEvent",
              )

              text = replace_once(
                  text,
                  '''    if(S && typeof S.invalidate === "function"){
                      S.invalidate();
                    }''',
                  '''    if(S && typeof S.invalidate === "function"){
                      S.invalidate({hard: true, clear: true});
                    }''',
                  "tabla.data-guard clear",
              )

              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 4. Gestion/Tabla/data/tabla.data-normalizer.js
          # =====================================================
          path = Path("Gestion/Tabla/data/tabla.data-normalizer.js")
          text = path.read_text(encoding="utf-8")

          if '3.1.0-explicit-period-linked-once' not in text:
              text = replace_once(
                  text,
                  'var VERSION = "3.0.0-regular-pvc";',
                  'var VERSION = "3.1.0-explicit-period-linked-once";',
                  "tabla.data-normalizer version",
              )

              classify_replacement = dedent('''
              function classifyPeriod(value){
                var source = value && typeof value === "object"
                  ? object(value)
                  : {};

                var explicit = key(
                  pick(
                    source,
                    [
                      "tipoPeriodo", "periodType", "tipo", "clasificacion",
                      "_tipoPeriodo", "periodoTipo"
                    ],
                    ""
                  )
                );

                if(explicit === "regular"){
                  return {
                    id: TYPES.regular || "REGULAR",
                    label: "Regular",
                    isRegular: true,
                    isPVC: false,
                    pattern: "EXPLICIT_REGULAR",
                    raw: text(value),
                    normalized: explicit
                  };
                }

                if(explicit === "pvc"){
                  return {
                    id: TYPES.pvc || "PVC",
                    label: "PVC",
                    isRegular: false,
                    isPVC: true,
                    pattern: "EXPLICIT_PVC",
                    raw: text(value),
                    normalized: explicit
                  };
                }

                var raw = value && typeof value === "object"
                  ? text(
                      pick(
                        value,
                        array(ALIASES.periodLabel)
                          .concat(array(ALIASES.periodId))
                          .concat(["id", "value"]),
                        ""
                      )
                    )
                  : text(value);

                var normalized = normalizedPeriodText(raw);
                var patterns = array(
                  C.periodPolicy && C.periodPolicy.regularPatterns
                );

                if(!patterns.length){
                  patterns = [
                    ["octubre", "marzo"],
                    ["abril", "septiembre"]
                  ];
                }

                var regularByText = patterns.some(function(pattern){
                  return array(pattern).every(function(token){
                    return normalized.indexOf(normalizedPeriodText(token)) >= 0;
                  });
                });

                var regularById =
                  /20\d{2}[^0-9]*10.*20\d{2}[^0-9]*03/.test(normalized) ||
                  /20\d{2}[^0-9]*04.*20\d{2}[^0-9]*09/.test(normalized);

                var regular = regularByText || regularById;

                return {
                  id: regular ? (TYPES.regular || "REGULAR") : (TYPES.pvc || "PVC"),
                  label: regular ? "Regular" : "PVC",
                  isRegular: regular,
                  isPVC: !regular,
                  pattern: regularById
                    ? "REGULAR_ID"
                    : regularByText
                      ? "REGULAR_TEXT"
                      : "PVC_FALLBACK",
                  raw: raw,
                  normalized: normalized
                };
              }
              ''')

              text = regex_once(
                  text,
                  r'  function classifyPeriod\(value\)\{.*?\n  \}\n\n  function classifyStudent\(row\)\{',
                  classify_replacement + '\n\n  function classifyStudent(row){',
                  "tabla.data-normalizer classifyPeriod",
              )

              text = replace_once(
                  text,
                  '''  function classifyStudent(row){
                    row = object(row);
                    var periodValue = pick(
                      row,
                      array(ALIASES.periodLabel).concat(array(ALIASES.periodId)),
                      ""
                    );
                    return classifyPeriod(periodValue);
                  }''',
                  '''  function classifyStudent(row){
                    row = object(row);
                    return classifyPeriod(row);
                  }''',
                  "tabla.data-normalizer classifyStudent",
              )

              text = replace_once(
                  text,
                  '    var studentsWithRequirements = attachRequirements(rawStudents, rawRequirements);',
                  '''    var alreadyLinked = rawStudents.every(function(row){
                      return !!(
                        row &&
                        (
                          Array.isArray(row.requisitos) ||
                          Array.isArray(row.requirements) ||
                          row._tablaRequirementsLinked === true
                        )
                      );
                    });

                    var studentsWithRequirements = alreadyLinked
                      ? rawStudents.slice()
                      : attachRequirements(rawStudents, rawRequirements);''',
                  "tabla.data-normalizer single linking",
              )

              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 5. Gestion/Tabla/core/tabla.constants.js
          # =====================================================
          path = Path("Gestion/Tabla/core/tabla.constants.js")
          text = path.read_text(encoding="utf-8")

          if 'requirementOrder: ""' not in text:
              text = replace_once(
                  text,
                  '''      status: "",
                      search: "",
                      requirements: ["falta"],''',
                  '''      status: "",
                      search: "",
                      requirementOrder: "",
                      requirements: ["falta"],''',
                  "tabla.constants requirementOrder",
              )
              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 6. Gestion/Tabla/tabla.html
          # =====================================================
          path = Path("Gestion/Tabla/tabla.html")
          text = path.read_text(encoding="utf-8")

          if 'id="tabla-sort-requirements"' not in text:
              text = replace_once(
                  text,
                  '''          <button
                    id="tabla-refresh"
                    class="tabla-btn-soft"
                    type="button"
                  >
                    Actualizar
                  </button>

                  <div class="tabla-message-menu">''',
                  '''          <button
                    id="tabla-refresh"
                    class="tabla-btn-soft"
                    type="button"
                  >
                    Actualizar
                  </button>

                  <button
                    id="tabla-sort-requirements"
                    class="tabla-btn-soft tabla-sort-requirements"
                    type="button"
                    data-order=""
                    aria-pressed="false"
                    title="Ordenar estudiantes por cantidad de requisitos faltantes"
                  >
                    Ordenar requisitos
                  </button>

                  <div class="tabla-message-menu">''',
                  "tabla.html sort button",
              )
              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 7. Gestion/Tabla/ui/tabla.render-controls.js
          # =====================================================
          path = Path("Gestion/Tabla/ui/tabla.render-controls.js")
          text = path.read_text(encoding="utf-8")

          if 'tabla-sort-requirements' not in text:
              text = replace_once(
                  text,
                  '''    renderChips(
                      state.requirements ||
                      []
                    );

                    var search =''',
                  '''    renderChips(
                      state.requirements ||
                      []
                    );

                    var sortRequirements =
                      el("tabla-sort-requirements");

                    if(sortRequirements){
                      var order = text(state.requirementOrder).toLowerCase();

                      sortRequirements.setAttribute(
                        "data-order",
                        order
                      );
                      sortRequirements.setAttribute(
                        "aria-pressed",
                        order ? "true" : "false"
                      );
                      sortRequirements.textContent =
                        order === "asc"
                          ? "Menos faltantes ↑"
                          : order === "desc"
                            ? "Más faltantes ↓"
                            : "Ordenar requisitos";
                    }

                    var search =''',
                  "tabla.render-controls render sort",
              )

              text = replace_once(
                  text,
                  '''    var chips =
                      el("tabla-req-chips");''',
                  '''    var sortRequirements =
                      el("tabla-sort-requirements");

                    if(sortRequirements){
                      sortRequirements.addEventListener(
                        "click",
                        function(){
                          if(
                            typeof handlers.onSortRequirements ===
                            "function"
                          ){
                            handlers.onSortRequirements();
                          }
                        }
                      );
                    }

                    var chips =
                      el("tabla-req-chips");''',
                  "tabla.render-controls bind sort",
              )

              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 8. Gestion/Tabla/core/tabla.app.js
          # =====================================================
          path = Path("Gestion/Tabla/core/tabla.app.js")
          text = path.read_text(encoding="utf-8")

          if '2.1.0-memory-sort-requirements' not in text:
              text = replace_once(
                  text,
                  'var VERSION = "2.0.0";',
                  'var VERSION = "2.1.0-memory-sort-requirements";',
                  "tabla.app version",
              )

              text = replace_once(
                  text,
                  '''  var refreshPromise = null;
                  var renderRevision = 0;''',
                  '''  var refreshPromise = null;
                  var renderRevision = 0;
                  var dataCache = null;''',
                  "tabla.app dataCache",
              )

              invalidate_replacement = dedent('''
              function invalidateVisuals(){
                if(
                  Controls &&
                  Controls.invalidate
                ){
                  Controls.invalidate();
                }

                if(
                  Table &&
                  Table.invalidate
                ){
                  Table.invalidate();
                }
              }
              ''')

              text = regex_once(
                  text,
                  r'  function invalidateVisuals\(\)\{.*?\n  \}\n\n  function readData\(current\)\{',
                  invalidate_replacement + '\n\n  function readData(current){',
                  "tabla.app invalidateVisuals",
              )

              read_replacement = dedent('''
              function readData(current){
                current = current || state();

                if(dataCache){
                  return Promise.resolve(dataCache);
                }

                if(!Source){
                  return Promise.reject(
                    new Error("TablaDataSource no está disponible.")
                  );
                }

                var task = Source.read
                  ? Source.read()
                  : Promise.all([
                      Source.readPeriods ? Source.readPeriods() : [],
                      Source.readStudents
                        ? Source.readStudents({matricula: ""})
                        : []
                    ]).then(function(result){
                      return {
                        periods: result[0] || [],
                        students: result[1] || [],
                        meta: {}
                      };
                    });

                return Promise.resolve(task).then(function(envelope){
                  envelope = envelope && typeof envelope === "object"
                    ? envelope
                    : {};

                  dataCache = {
                    periods: Array.isArray(envelope.periods)
                      ? envelope.periods.slice()
                      : [],
                    students: Array.isArray(envelope.students || envelope.rows)
                      ? (envelope.students || envelope.rows).slice()
                      : [],
                    meta: Object.assign({}, envelope.meta || {}),
                    revision: Number(
                      envelope.revision ||
                      envelope.meta && envelope.meta.revision ||
                      0
                    )
                  };

                  return dataCache;
                });
              }

              function missingRequirementCount(row){
                row = row || {};

                if(Array.isArray(row._requisitosFaltantes)){
                  return row._requisitosFaltantes.length;
                }

                var requirements = Array.isArray(row._requisitos)
                  ? row._requisitos
                  : Array.isArray(row.requisitos)
                    ? row.requisitos
                    : [];

                return requirements.filter(function(item){
                  var status = text(
                    item && (
                      item.estado ||
                      item.status ||
                      item.value ||
                      item.valor
                    )
                  ).toLowerCase();

                  return status === "no_cumple" || status === "no cumple";
                }).length;
              }

              function sortRowsByRequirements(rows, order){
                rows = Array.isArray(rows) ? rows.slice() : [];
                order = text(order).toLowerCase();

                if(order !== "asc" && order !== "desc"){
                  return rows;
                }

                return rows
                  .map(function(row, index){
                    return {
                      row: row,
                      index: index,
                      count: missingRequirementCount(row)
                    };
                  })
                  .sort(function(a, b){
                    var difference = order === "asc"
                      ? a.count - b.count
                      : b.count - a.count;

                    return difference || a.index - b.index;
                  })
                  .map(function(item){
                    return item.row;
                  });
              }
              ''')

              text = regex_once(
                  text,
                  r'  function readData\(current\)\{.*?\n  \}\n\n  function completeRender\(',
                  read_replacement + '\n\n  function completeRender(',
                  "tabla.app readData",
              )

              text = replace_once(
                  text,
                  '''    var pageResult =
                      Pagination &&
                      Pagination.build
                        ? Pagination.build(
                            filtered,
                            current.page,
                            current.pageSize
                          )''',
                  '''    var ordered = sortRowsByRequirements(
                      filtered,
                      current.requirementOrder
                    );

                    var pageResult =
                      Pagination &&
                      Pagination.build
                        ? Pagination.build(
                            ordered,
                            current.page,
                            current.pageSize
                          )''',
                  "tabla.app sort before pagination",
              )

              text = replace_once(
                  text,
                  '''        allRows:
                          filtered,

                        filteredRows:
                          filtered,''',
                  '''        allRows:
                          ordered,

                        filteredRows:
                          ordered,''',
                  "tabla.app ordered state",
              )

              text = replace_once(
                  text,
                  '''    status(
                      summaryMessage ||
                      (
                        "Tabla cargada por " +
                        sourceName() +
                        " · " +
                        (
                          Date.now() -
                          started
                        ) +
                        " ms."
                      ),
                      "ok"
                    );''',
                  '''    var stale = !!(
                      data.meta &&
                      data.meta.stale === true
                    );

                    status(
                      (
                        stale
                          ? "Mostrando la última versión válida. "
                          : ""
                      ) +
                      (
                        summaryMessage ||
                        (
                          "Tabla cargada por " +
                          sourceName() +
                          " · " +
                          (
                            Date.now() -
                            started
                          ) +
                          " ms."
                        )
                      ),
                      stale ? "warn" : "ok"
                    );''',
                  "tabla.app stale status",
              )

              text = replace_once(
                  text,
                  '''        .then(function(result){
                          invalidateVisuals();

                          return render()''',
                  '''        .then(function(result){
                          dataCache = null;
                          invalidateVisuals();

                          return render()''',
                  "tabla.app refresh invalidates cache",
              )

              text = replace_once(
                  text,
                  '''        function(){
                          invalidateVisuals();

                          request(''',
                  '''        function(){
                          dataCache = null;
                          invalidateVisuals();

                          request(''',
                  "tabla.app event invalidates cache",
              )

              text = replace_once(
                  text,
                  '''      onRefresh:
                        refresh
                    });''',
                  '''      onRefresh:
                        refresh,

                      onSortRequirements:
                        function(){
                          var current = state();
                          var nextOrder =
                            current.requirementOrder === "desc"
                              ? "asc"
                              : "desc";

                          applyFilter(
                            {
                              requirementOrder: nextOrder
                            },
                            "requirementOrder"
                          );
                        }
                    });''',
                  "tabla.app bind sort handler",
              )

              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 9. Gestion/Tabla/ui/tabla.render-table.js
          # =====================================================
          path = Path("Gestion/Tabla/ui/tabla.render-table.js")
          text = path.read_text(encoding="utf-8")

          if '2.2.0-requirement-badges' not in text:
              text = replace_once(
                  text,
                  '"2.1.0-row-status-actions";',
                  '"2.2.0-requirement-badges";',
                  "tabla.render-table version",
              )

              insert_marker = '  function messageCell(){\n'
              badge_functions = dedent('''
              function requirementKey(item){
                item = item || {};

                return text(
                  item.key ||
                  item.requisitoKey ||
                  item.requirementKey ||
                  item.field ||
                  item.label ||
                  item.nombre ||
                  ""
                )
                  .normalize("NFD")
                  .replace(/[\u0300-\u036f]/g, "")
                  .toLowerCase()
                  .replace(/[^a-z0-9]+/g, "");
              }

              function requirementShort(item){
                var key = requirementKey(item);
                var shorts = {
                  academico: "Aca",
                  documentacion: "Doc",
                  documentacionacademica: "Doc",
                  financiero: "Fin",
                  titulacion: "Tit",
                  practicasvinculacion: "PP",
                  practicaspreprofesionales: "PP",
                  vinculacion: "Vinc",
                  seguimientograduados: "Grad",
                  ingles: "Ing",
                  segundalengua: "Ing",
                  actualizaciondatos: "Datos"
                };

                return shorts[key] || text(item && (item.label || item.nombre || item.key)) || "Req";
              }

              function missingRequirements(row){
                row = row || {};

                var requirements = Array.isArray(row._requisitosFaltantes)
                  ? row._requisitosFaltantes
                  : Array.isArray(row._requisitos)
                    ? row._requisitos
                    : Array.isArray(row.requisitos)
                      ? row.requisitos
                      : [];

                return requirements.filter(function(item){
                  var status = text(
                    item && (
                      item.estado ||
                      item.status ||
                      item.value ||
                      item.valor
                    )
                  ).toLowerCase();

                  return status === "no_cumple" || status === "no cumple";
                });
              }

              function requirementsCell(row){
                var missing = missingRequirements(row);

                if(!missing.length){
                  return (
                    '<div class="tabla-req-badges">' +
                    '<span class="tabla-req-badge tabla-req-badge--ok">Cumple</span>' +
                    '</div>'
                  );
                }

                return (
                  '<div class="tabla-req-badges" aria-label="Requisitos faltantes">' +
                  missing.map(function(item){
                    var label = text(item && (item.label || item.nombre || item.key));

                    return (
                      '<span class="tabla-req-badge tabla-req-badge--missing" title="' +
                      esc(label || requirementShort(item)) +
                      '">' +
                      esc(requirementShort(item)) +
                      '</span>'
                    );
                  }).join("") +
                  '</div>'
                );
              }

              ''') + '\n'

              text = replace_once(
                  text,
                  insert_marker,
                  badge_functions + insert_marker,
                  "tabla.render-table badge functions",
              )

              text = replace_once(
                  text,
                  "      '<td><span class=\"tabla-last-message\">—</span></td>' +",
                  '''      '<td class="tabla-requirements-cell">' +
                        requirementsCell(row) +
                        "</td>" +''',
                  "tabla.render-table requirements cell",
              )

              text = replace_once(
                  text,
                  '      "<th>Último</th>",',
                  '      "<th>Requisitos</th>",',
                  "tabla.render-table header",
              )

              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 10. Gestion/Tabla/communication/tabla.actions.js
          # =====================================================
          path = Path("Gestion/Tabla/communication/tabla.actions.js")
          text = path.read_text(encoding="utf-8")

          if '2.2.0-preserve-requirement-cell' not in text:
              text = replace_once(
                  text,
                  '"2.1.0-stable-actions";',
                  '"2.2.0-preserve-requirement-cell";',
                  "tabla.actions version",
              )

              text = replace_once(
                  text,
                  '''    var last =
                      safeLastLabel(row);

                    setCellHtml(
                      tableRow.children[4],
                      '<span class="tabla-last-message" title="' +
                      esc(last) +
                      '">' +
                      esc(last) +
                      "</span>"
                    );

                    setCellHtml(''',
                  '''    setCellHtml(''',
                  "tabla.actions preserve requirements cell",
              )

              path.write_text(text, encoding="utf-8")

          # =====================================================
          # 11. Gestion/Tabla/css/tabla.table.css
          # =====================================================
          path = Path("Gestion/Tabla/css/tabla.table.css")
          text = path.read_text(encoding="utf-8")

          marker = "/* TABLA REQUIREMENT BADGES V1 */"
          if marker not in text:
              text = text.rstrip() + "\n\n" + dedent('''
              /* TABLA REQUIREMENT BADGES V1 */
              .tabla-sort-requirements[data-order="desc"],
              .tabla-sort-requirements[data-order="asc"] {
                font-weight: 700;
              }

              .tabla-requirements-cell {
                min-width: 132px;
                max-width: 230px;
              }

              .tabla-req-badges {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 4px;
              }

              .tabla-req-badge {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                min-height: 22px;
                padding: 2px 7px;
                border: 1px solid transparent;
                border-radius: 999px;
                font-size: 11px;
                font-weight: 800;
                line-height: 1;
                white-space: nowrap;
              }

              .tabla-req-badge--missing {
                color: #991b1b;
                background: #fee2e2;
                border-color: #fecaca;
              }

              .tabla-req-badge--ok {
                color: #166534;
                background: #dcfce7;
                border-color: #bbf7d0;
              }
              ''') + "\n"
              path.write_text(text, encoding="utf-8")
          PY

      - name: Validate JavaScript and expected changes
        shell: bash
        run: |
          node --check BDLocal/conexiones/cone.tabla.js
          node --check Gestion/Tabla/data/tabla.data-source.js
          node --check Gestion/Tabla/data/tabla.data-guard.js
          node --check Gestion/Tabla/data/tabla.data-normalizer.js
          node --check Gestion/Tabla/core/tabla.constants.js
          node --check Gestion/Tabla/ui/tabla.render-controls.js
          node --check Gestion/Tabla/core/tabla.app.js
          node --check Gestion/Tabla/ui/tabla.render-table.js
          node --check Gestion/Tabla/communication/tabla.actions.js

          grep -q 'id="tabla-sort-requirements"' Gestion/Tabla/tabla.html
