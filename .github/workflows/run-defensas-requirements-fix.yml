name: Run Defensas requirements fix

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/run-defensas-requirements-fix.yml"

permissions:
  contents: write

jobs:
  run:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Extract prepared patch
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          source = Path('.github/workflows/apply-defensas-requirements-fix.yml').read_text(encoding='utf-8')
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n"
          start = source.index(start_marker) + len(start_marker)
          end = source.index(end_marker, start)
          script = textwrap.dedent(source[start:end])
          Path('/tmp/patch_defensas.py').write_text(script, encoding='utf-8')
          PY

      - name: Apply patch with diagnostics
        shell: bash
        run: |
          set +e
          python /tmp/patch_defensas.py > /tmp/defensas-patch.log 2>&1
          code=$?
          set -e

          if [ "$code" -ne 0 ]; then
            cp /tmp/defensas-patch.log defensas-patch-error.txt
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add defensas-patch-error.txt
            git commit -m "Registra diagnóstico de corrección Defensas"
            git push origin HEAD:${{ github.head_ref }}
            cat /tmp/defensas-patch.log
            exit "$code"
          fi

      - name: Validate correction
        run: |
          node --check BDLocal/conexiones/cone.defensas.js
          node --check defart/defart.requirements-guard.js
          test ! -e BDLocal/conexiones/cone.defensas.requisitos.js
          test ! -e BDLocal/conexiones/cone.defensas.adapters.js
          grep -q '0.4.0-requirements-hydration' BDLocal/conexiones/cone.defensas.js
          grep -q 'listRequirementsSync' BDLocal/conexiones/cone.defensas.js
          grep -q 'patchDefensasService' BDLocal/conexiones/cone.defensas.js
          grep -q 'defart.requirements-guard.js' defart/defart.html
          ! grep -q 'cone.defensas.requisitos.js' defart/defart.html
          git diff --check

      - name: Commit final correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f defensas-patch-error.txt
          rm -f .github/workflows/apply-defensas-requirements-fix.yml
          rm -f .github/workflows/run-defensas-requirements-fix.yml
          git add BDLocal/conexiones/cone.defensas.js defart/defart.html defart/defart.requirements-guard.js defensas-patch-error.txt .github/workflows/apply-defensas-requirements-fix.yml .github/workflows/run-defensas-requirements-fix.yml
          git diff --cached --check
          git commit -m "Corrige requisitos de Defensas desde cone.defensas"
          git push origin HEAD:${{ github.head_ref }}
