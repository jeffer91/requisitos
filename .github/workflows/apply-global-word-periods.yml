name: Apply Global Word and period rules

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/global-fix/**"

permissions:
  contents: write

jobs:
  apply-global-fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Apply Global Core period rules
        shell: bash
        run: |
          set -euo pipefail
          git apply --whitespace=nowarn .github/global-fix/global.core.js.patch

      - name: Apply Global PDF signatures
        shell: python
        run: |
          from pathlib import Path

          path = Path("Global/global.pdf.js")
          content = path.read_text(encoding="utf-8")

          def replace_once(source, old, new, label):
              count = source.count(old)
              if count != 1:
                  raise SystemExit(
                      f"No se encontró una única ancla para {label}: {count}"
                  )
              return source.replace(old, new, 1)

          content = replace_once(
              content,
              "- Incluir resumen ejecutivo, explicaciones, observaciones, tabla y gráfico.",
              "- Incluir resumen ejecutivo, explicaciones, observaciones, tabla, gráfico y firmas institucionales.",
              "descripción PDF"
          )

          content = replace_once(
              content,
              '    "1.2.1-active-filters-only";',
              '    "1.3.0-signatures-and-word-model";',
              "versión PDF"
          )

          functions = '''  function institutionalSignatures(){
            return [
              {
                nombre:
                  "Mpde. Martha Tomalá",

                cargo:
                  "Secretaria General"
              },
              {
                nombre:
                  "Mgt. Jefferson Villarreal",

                cargo:
                  "Coordinador de Titulación y Eficiencia Terminal"
              }
            ];
          }

          function signatureBlock(){
            return ""
              + '<section class="signature-block"'
              + ' aria-label="Firmas institucionales">'

              + institutionalSignatures()
                .map(function(signature){
                  return ""
                    + '<div class="signature-item">'
                    + '<strong class="signature-name">'
                    + esc(signature.nombre)
                    + "</strong>"
                    + '<span class="signature-role">'
                    + esc(signature.cargo)
                    + "</span>"
                    + "</div>";
                })
                .join("")

              + "</section>";
          }

'''

          content = replace_once(
              content,
              "  function institutionalCss(){",
              functions + "  function institutionalCss(){",
              "funciones de firmas"
          )

          signature_css = '''      + ".signature-block{"
              + "margin-top:42px;"
              + "padding-top:24px;"
              + "min-height:235px;"
              + "break-inside:avoid;"
              + "page-break-inside:avoid;"
              + "text-align:left;"
              + "}"

              + ".signature-item{"
              + "width:300px;"
              + "break-inside:avoid;"
              + "page-break-inside:avoid;"
              + "}"

              + ".signature-item + .signature-item{"
              + "margin-top:88px;"
              + "}"

              + ".signature-name,"
              + ".signature-role{"
              + "display:block;"
              + "color:#000;"
              + "font-size:10.5px;"
              + "line-height:1.15;"
              + "}"

              + ".signature-name{"
              + "font-weight:700;"
              + "}"

              + ".signature-role{"
              + "font-weight:700;"
              + "max-width:245px;"
              + "}"

'''

          content = replace_once(
              content,
              '      + ".footer-note{"',
              signature_css + '      + ".footer-note{"',
              "estilos de firmas"
          )

          content = replace_once(
              content,
              '''      + ".report-block,"
              + ".metric-card,"
              + ".info-card{"''',
              '''      + ".report-block,"
              + ".metric-card,"
              + ".info-card,"
              + ".signature-block,"
              + ".signature-item{"''',
              "protección de saltos de página"
          )

          content = replace_once(
              content,
              '''      + "seleccionados por el usuario."

              + "</p>"

              + "</section>"''',
              '''      + "seleccionados por el usuario."

              + "</p>"

              + signatureBlock()

              + "</section>"''',
              "bloque final de firmas"
          )

          content = replace_once(
              content,
              '''    filterRows:
              filterRows
          };''',
              '''    filterRows:
              filterRows,

            label:
              label,

            tableExplanation:
              tableExplanation,

            getSignatures:
              function(){
                return institutionalSignatures()
                  .map(function(item){
                    return {
                      nombre: item.nombre,
                      cargo: item.cargo
                    };
                  });
              },

            signatureBlock:
              signatureBlock
          };''',
              "API compartida del PDF"
          )

          path.write_text(content, encoding="utf-8")

      - name: Apply Global App Word connection
        shell: bash
        run: |
          set -euo pipefail
          git apply --whitespace=nowarn .github/global-fix/global.app.js.patch

      - name: Build Global Word generator
        shell: bash
        run: |
          set -euo pipefail
          cat .github/global-fix/global.word.js.b64.part-* \
            | tr -d '\n\r' \
            | base64 --decode \
            > Global/global.word.js

      - name: Validate Global JavaScript and requirements
        shell: bash
        run: |
          set -euo pipefail
          node --check Global/global.core.js
          node --check Global/global.pdf.js
          node --check Global/global.app.js
          node --check Global/global.word.js

          grep -q 'function isPeriodAvailable' Global/global.core.js
          grep -q 'function availablePeriodList' Global/global.core.js
          grep -q 'Mpde. Martha Tomalá' Global/global.pdf.js
          grep -q 'Mgt. Jefferson Villarreal' Global/global.pdf.js
          grep -q 'window.GlobalWord' Global/global.word.js
          grep -q '".docx"' Global/global.word.js
          grep -q 'function generateWord' Global/global.app.js

      - name: Remove temporary Global resources
        shell: bash
        run: |
          rm -rf .github/global-fix

      - name: Commit corrected Global files
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Global/global.core.js Global/global.pdf.js Global/global.app.js Global/global.word.js .github/global-fix

          if git diff --cached --quiet; then
            echo "No hay cambios pendientes en Global."
            exit 0
          fi

          git commit -m "Implementa Word y periodos inteligentes en Global"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
