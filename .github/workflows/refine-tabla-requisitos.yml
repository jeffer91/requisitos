name: Refine Tabla requirements

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/refine-tabla-requisitos.yml"

permissions:
  contents: write

jobs:
  refine:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Refine final behavior and layout
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          def regex_once(text, pattern, replacement, label):
              updated, count = re.subn(
                  pattern,
                  lambda match: replacement,
                  text,
                  count=1,
                  flags=re.S,
              )
              if count != 1:
                  raise RuntimeError(f"{label}: expected 1 match, found {count}")
              return updated

          path = Path('Gestion/Tabla/ui/tabla.render-table.js')
          text = path.read_text(encoding='utf-8')
          replacement = textwrap.dedent('''
            function requirementsCell(row){
              var missing = missingRequirements(row);

              if(!missing.length){
                if(rowStatus(row) === "cumple"){
                  return (
                    '<div class="tabla-req-badges">' +
                    '<span class="tabla-req-badge tabla-req-badge--ok">Cumple</span>' +
                    '</div>'
                  );
                }

                return '<span class="tabla-req-empty" title="Sin faltantes confirmados">—</span>';
              }

              return (
                '<div class="tabla-req-badges" aria-label="Requisitos faltantes">' +
                missing.map(function(item){
                  var label = text(item && (item.label || item.nombre || item.key));

                  return (
                    '<span class="tabla-req-badge tabla-req-badge--missing" title="' +
                    esc(label || requirementShort(item)) +
                    '">' +
                    esc(requirementShort(item)) +
                    '</span>'
                  );
                }).join("") +
                '</div>'
              );
            }
          ''').strip('\n')
          text = regex_once(
              text,
              r'\s*function requirementsCell\(row\)\{.*?\n\s*\}\n\s*function messageCell\(\)\{',
              '\n  ' + replacement + '\n\n  function messageCell(){',
              'requirementsCell',
          )
          path.write_text(text, encoding='utf-8')

          path = Path('Gestion/Tabla/core/tabla.app.js')
          text = path.read_text(encoding='utf-8')
          text = regex_once(
              text,
              r'rows:\s*filtered\.slice\(\),\s*allRows:\s*filtered\.slice\(\),',
              'rows:\n              ordered.slice(),\n\n            allRows:\n              ordered.slice(),',
              'fallback ordered rows',
          )
          path.write_text(text, encoding='utf-8')

          path = Path('Gestion/Tabla/tabla.html')
          text = path.read_text(encoding='utf-8')
          html = textwrap.dedent('''
                    <button
                      id="tabla-refresh"
                      class="tabla-btn-soft"
                      type="button"
                    >
                      Actualizar
                    </button>

                    <button
                      id="tabla-sort-requirements"
                      class="tabla-btn-soft tabla-sort-requirements"
                      type="button"
                      data-order=""
                      aria-pressed="false"
                      title="Ordenar estudiantes por cantidad de requisitos faltantes"
                    >
                      Ordenar requisitos
                    </button>

                    <div class="tabla-message-menu">
          ''').strip('\n')
          text = regex_once(
              text,
              r'\s*<button\s+id="tabla-refresh".*?<div class="tabla-message-menu">',
              '\n' + html,
              'html action buttons',
          )
          path.write_text(text, encoding='utf-8')

          path = Path('Gestion/Tabla/css/tabla.table.css')
          text = path.read_text(encoding='utf-8')
          if '.tabla-req-empty' not in text:
              text = text.rstrip() + textwrap.dedent('''

                .tabla-req-empty {
                  color: #64748b;
                  font-size: 13px;
                  font-weight: 700;
                }
              ''')
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate refined files
        run: |
          node --check Gestion/Tabla/ui/tabla.render-table.js
          node --check Gestion/Tabla/core/tabla.app.js
          grep -q 'tabla-req-empty' Gestion/Tabla/css/tabla.table.css
          grep -q 'id="tabla-sort-requirements"' Gestion/Tabla/tabla.html
          git diff --check

      - name: Commit refinement and remove workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/refine-tabla-requisitos.yml
          git add \
            Gestion/Tabla/ui/tabla.render-table.js \
            Gestion/Tabla/core/tabla.app.js \
            Gestion/Tabla/tabla.html \
            Gestion/Tabla/css/tabla.table.css \
            .github/workflows/refine-tabla-requisitos.yml
          git diff --cached --check
          git commit -m "Refina orden y tarjetas de requisitos"
          git push origin HEAD:${{ github.head_ref }}
