name: Apply Stats repository fix

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/trigger-stats-fix.txt"

permissions:
  contents: write

jobs:
  apply-stats-fix:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Patch Stats and verify connection
        shell: python
        run: |
          from pathlib import Path
          import re

          core_path = Path("Stats/stats.core.js")
          core = core_path.read_text(encoding="utf-8")

          new = """  function excelRepo(){
            return (
              window.BDLocalStats ||
              window.ConStats ||
              window.ExcelLocalRepo ||
              null
            );
          }"""

          if "window.BDLocalStats ||" in core and "window.ConStats ||" in core:
              print("Stats ya usa BDLocalStats.")
          else:
              pattern = re.compile(
                  r"(?m)^  function excelRepo\(\)\{\s*"
                  r"return window\.ExcelLocalRepo \|\| null;\s*"
                  r"^  \}"
              )
              updated, count = pattern.subn(new, core, count=1)

              if count != 1:
                  raise SystemExit(
                      "No se encontró una única función excelRepo() con el bloque antiguo."
                  )

              core_path.write_text(updated, encoding="utf-8")
              print("Bloque excelRepo actualizado.")

          connection_path = Path("BDLocal/conexiones/cone.stats.js")
          connection = connection_path.read_text(encoding="utf-8")

          required = [
              'var VERSION = "1.3.0-requirements-hydration";',
              "function buildRequirementsIndex(current)",
              "function hydrateStudent(",
              "function students(options)"
          ]

          missing = [item for item in required if item not in connection]
          if missing:
              raise SystemExit(
                  "cone.stats.js no cumple la versión requerida: "
                  + ", ".join(missing)
              )

          print("cone.stats.js verificado correctamente.")

      - name: Commit correction to pull request branch
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Stats/stats.core.js

          if git diff --cached --quiet; then
            echo "No hay cambios pendientes en Stats."
            exit 0
          fi

          git commit -m "Hace que Stats use BDLocalStats"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
