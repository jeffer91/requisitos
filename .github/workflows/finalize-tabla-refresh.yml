name: Finalize Tabla refresh handling

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/finalize-tabla-refresh.yml"

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Preserve warning when refresh fails
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          path = Path('Gestion/Tabla/core/tabla.app.js')
          text = path.read_text(encoding='utf-8')

          replacement = textwrap.dedent('''
            function refresh(){
              if(refreshPromise){
                return refreshPromise;
              }

              var refreshError = null;

              update(
                {
                  refreshing: true
                },
                {
                  reason: "refresh-start"
                }
              );

              status(
                "Actualizando Tabla desde Base Local...",
                ""
              );

              refreshPromise = Promise.resolve(
                Source && Source.refresh
                  ? Source.refresh({
                      source: "TablaApp.refresh",
                      full: true,
                      immediate: true
                    })
                  : Promise.reject(
                      new Error("TablaDataSource.refresh no está disponible.")
                    )
              )
                .catch(function(error){
                  refreshError = error;
                  return null;
                })
                .then(function(result){
                  if(!refreshError){
                    dataCache = null;
                    invalidateVisuals();
                  }

                  return render().then(function(){
                    if(refreshError){
                      status(
                        "No se pudo actualizar Tabla. Se conservan los datos anteriores. " +
                        (
                          refreshError.message ||
                          text(refreshError)
                        ),
                        "warn"
                      );
                    }

                    return result;
                  });
                })
                .finally(function(){
                  update(
                    {
                      refreshing: false
                    },
                    {
                      reason: "refresh-end"
                    }
                  );

                  refreshPromise = null;
                });

              return refreshPromise;
            }
          ''').strip('\n')

          text, count = re.subn(
              r'\s*function refresh\(\)\{.*?\n\s*\}\n\n\s*function applyFilter\(',
              lambda match: '\n  ' + replacement + '\n\n  function applyFilter(',
              text,
              count=1,
              flags=re.S,
          )

          if count != 1:
              raise RuntimeError(f'refresh function: expected 1 match, found {count}')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate final refresh behavior
        run: |
          node --check Gestion/Tabla/core/tabla.app.js
          grep -q 'Se conservan los datos anteriores' Gestion/Tabla/core/tabla.app.js
          git diff --check

      - name: Commit and remove temporary workflow
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f .github/workflows/finalize-tabla-refresh.yml
          git add Gestion/Tabla/core/tabla.app.js .github/workflows/finalize-tabla-refresh.yml
          git diff --cached --check
          git commit -m "Conserva aviso cuando falla actualización de Tabla"
          git push origin HEAD:${{ github.head_ref }}
