name: Apply Global institutional report fix

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-global-institutional-report-fix.yml"
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-global-institutional-report-fix
  cancel-in-progress: false

jobs:
  apply-fix:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Apply and validate institutional report corrections
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin main

          if [ ! -d .github/tmp-global-report ]; then
            echo "Temporary correction files are no longer present."
            exit 0
          fi

          cat .github/tmp-global-report/patch-*.b64 \
            | base64 --decode \
            | gzip -dc > /tmp/patch_global_reports.py

          python3 -m py_compile /tmp/patch_global_reports.py
          python3 /tmp/patch_global_reports.py

          cat .github/tmp-global-report/logo-*.b64 \
            | base64 --decode \
            > Global/assets/branding/logo-instituto.png

          test "$(wc -c < Global/assets/branding/logo-instituto.png)" -gt 1000
          python3 - <<'PY'
          from pathlib import Path
          image = Path('Global/assets/branding/logo-instituto.png').read_bytes()
          if not image.startswith(b'\x89PNG\r\n\x1a\n'):
              raise SystemExit('El logo reconstruido no es un PNG válido.')
          PY

          node --check Global/global.config.js
          node --check Global/global.pdf.js
          node --check Global/global.word.js

          python3 - <<'PY'
          from pathlib import Path

          config = Path('Global/global.config.js').read_text(encoding='utf-8')
          pdf = Path('Global/global.pdf.js').read_text(encoding='utf-8')
          word = Path('Global/global.word.js').read_text(encoding='utf-8')

          checks = {
              'firma elaborador': 'Mgtr. Jefferson Villarreal' in config,
              'firma revisora': 'Mpde. Martha Tomalá' in config,
              'firma aprobador': 'Dr. Alex León T.' in config,
              'limpieza de carrera': 'function reportCareer' in pdf,
              'redacción de períodos': 'function reportPeriod' in pdf,
              'tabla de firmas Word': 'function signatureTable' in word,
              'encabezado Word': 'word/header1.xml' in word,
              'pie Word': 'word/footer1.xml' in word,
              'numeración Word': 'fieldCode("PAGE")' in word and 'fieldCode("NUMPAGES")' in word,
              'texto interno retirado PDF': 'Períodos que registran al menos un estudiante graduado' not in pdf,
              'texto interno retirado Word': 'Períodos que registran al menos un estudiante graduado' not in word,
              'firmas finales retiradas': 'signatureParagraphs(' not in word,
              'metodología exacta': 'AprobacionTitulacion' in pdf and 'AprobacionTitulacion' in word,
          }

          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit('Validaciones fallidas: ' + ', '.join(failed))
          PY

          git rm -r .github/tmp-global-report
          git rm .github/workflows/apply-global-institutional-report-fix.yml

          git add \
            Global/global.config.js \
            Global/global.pdf.js \
            Global/global.word.js \
            Global/assets/branding/README.md \
            Global/assets/branding/logo-instituto.png

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Mejora reportes institucionales Global"
          git push origin main
