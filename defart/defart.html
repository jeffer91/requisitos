<!doctype html>
<!-- =========================================================
Nombre completo: defart.html
Ruta o ubicación: /Requisitos/defart/defart.html
Función o funciones:
- Pantalla Defensas para cargar N-ART y N-DEF desde BDLocal.
- Calcular N-FIN con 70% artículo y 30% defensa.
- Mostrar filtros compactos en 2 filas, sin encabezado grande.
- Mostrar tabla más visual, ordenable y cómoda para navegar.
- Guardar cambios generales y guardar una sola fila con botón por estudiante en Acciones.
- Registrar notas como eventos críticos de continuidad.
- Descargar Excel visible de notas.
- Usar divisiones configuradas rápidas.
- Aplicar paginación de 25 filas y cache de resumen para mejorar rendimiento.
Con qué se conecta:
- ../BDLocal/adapters/bdl.screen-deps.js
- ../BDLocal/adapters/bdl.divisiones.fast-cache.js
- defart.css
- defart.table.visual.css
- defart.core.js
- defart.performance.js
- defart.continuity.js
- defart.export.js
- defart.table.js
- defart.app.js
========================================================= -->
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Defensas</title>
  <link rel="stylesheet" href="defart.css" />
  <link rel="stylesheet" href="defart.table.visual.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <main class="def-app">
    <section id="def-status" class="def-status" style="display:none;"></section>

    <section class="def-toolbar" aria-label="Filtros de Defensas">
      <div class="def-toolbar-row def-toolbar-row-main">
        <label>
          <span>Período</span>
          <select id="def-filter-periodo"><option value="">Todos</option></select>
        </label>

        <label>
          <span>División</span>
          <select id="def-filter-division"><option value="">Todas</option></select>
        </label>

        <label class="def-filter-wide">
          <span>Carrera</span>
          <select id="def-filter-carrera"><option value="">Todas</option></select>
        </label>

        <label>
          <span>Estado</span>
          <select id="def-filter-estado">
            <option value="">Todos</option>
            <option value="Sin requisitos">Sin requisitos</option>
            <option value="Pendiente Art">Pendiente Art</option>
            <option value="Supletorio Art">Supletorio Art</option>
            <option value="Pendiente Def">Pendiente Def</option>
            <option value="Supletorio Def">Supletorio Def</option>
            <option value="Completo">Completo</option>
          </select>
        </label>
      </div>

      <div class="def-toolbar-row def-toolbar-row-secondary">
        <label class="def-search-box">
          <span>Buscar</span>
          <input id="def-filter-search" type="search" placeholder="Cédula, nombre, carrera o división..." />
        </label>

        <div class="def-mini-summary" aria-label="Resumen de pantalla">
          <span id="def-visible-count">0 visibles</span>
          <span id="def-save-state">Listo</span>
        </div>

        <div class="def-toolbar-actions">
          <button id="def-btn-clear" type="button">Limpiar filtros</button>
          <button id="def-btn-export" type="button">Descargar Excel</button>
        </div>
      </div>
    </section>

    <section class="def-progress-wrap" aria-label="Progreso de guardado">
      <div class="def-progress-info">
        <span id="def-progress-text">Sin cambios pendientes.</span>
        <span>N-FIN = N-ART 70% + N-DEF 30%</span>
      </div>
      <div class="def-progress-track"><div id="def-progress-bar" class="def-progress-bar"></div></div>
    </section>

    <section class="def-table-card" aria-label="Tabla de notas de defensa">
      <div class="def-table-note">
        <span>Enter avanza a la siguiente nota.</span>
        <span>N-ART depende de requisitos cumplidos.</span>
        <span>N-DEF se habilita con N-ART igual o mayor a 7.</span>
      </div>
      <div id="def-table-wrap" class="def-table-wrap"><div class="def-empty">Cargando estudiantes...</div></div>
    </section>

    <section class="def-diagnostics-card">
      <details>
        <summary>Diagnóstico</summary>
        <pre id="def-diagnostics">{}</pre>
      </details>
    </section>
  </main>

  <button id="def-btn-save" class="def-floating-save" type="button" disabled>Guardar cambios</button>

  <script src="../BDLocal/adapters/bdl.screen-deps.js"></script>
  <script src="../BDLocal/adapters/bdl.divisiones.fast-cache.js"></script>
  <script src="defart.core.js"></script>
  <script src="defart.continuity.js"></script>
  <script src="defart.export.js"></script>
  <script src="defart.table.js"></script>
  <script src="defart.performance.js"></script>
  <script src="defart.app.js"></script>
</body>
</html>
