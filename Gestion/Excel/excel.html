<!DOCTYPE html>
<!-- =========================================================
Nombre completo: excel.html
Ruta o ubicación: /Requisitos/Gestion/Excel/excel.html
Función o funciones:
- Pantalla inicial del módulo Carga.
- Conectar el motor de lectura, validación, resumen y Base Local.
- Usar la misma base local de BL para períodos, estudiantes y matrícula.
- No mostrar título propio porque el título lo controla Maqueta.
Con qué se conecta:
- excel.css
- ../../BaseLocal/services/bl-campos.js
- ../../BaseLocal/services/bl-normalizador.js
- ../../BaseLocal/services/bl-matricula.service.js
- excel-local.repo.js
- excel-ui.js
========================================================= -->
<html lang="es">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title></title><link rel="stylesheet" href="excel.css"/><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script></head>
<body>
<main class="excel-page">
<section class="excel-card"><h2>1. Crear período</h2><div class="excel-grid excel-grid-5"><label>Inicio mes<select id="inicioMes"><option value="1">1 - Enero</option><option value="2">2 - Febrero</option><option value="3">3 - Marzo</option><option value="4">4 - Abril</option><option value="5">5 - Mayo</option><option value="6">6 - Junio</option><option value="7">7 - Julio</option><option value="8">8 - Agosto</option><option value="9">9 - Septiembre</option><option value="10">10 - Octubre</option><option value="11">11 - Noviembre</option><option value="12">12 - Diciembre</option></select></label><label>Inicio año<input id="inicioAnio" type="number" min="2000" max="2100" step="1"/></label><label>Fin mes<select id="finMes"><option value="1">1 - Enero</option><option value="2">2 - Febrero</option><option value="3">3 - Marzo</option><option value="4">4 - Abril</option><option value="5">5 - Mayo</option><option value="6">6 - Junio</option><option value="7">7 - Julio</option><option value="8">8 - Agosto</option><option value="9">9 - Septiembre</option><option value="10">10 - Octubre</option><option value="11">11 - Noviembre</option><option value="12">12 - Diciembre</option></select></label><label>Fin año<input id="finAnio" type="number" min="2000" max="2100" step="1"/></label><button id="excel-add-period-btn" class="btn primary" type="button">Crear período</button></div></section>
<section class="excel-card"><h2>2. Cargar archivo</h2><div class="excel-grid excel-grid-file"><label>Período<select id="excel-cargar-period-select"></select></label><label>Archivo Excel<input id="excel-file-input" type="file" accept=".xlsx,.xls,.csv"/></label><button id="excel-analyze-save-btn" class="btn primary" type="button">Analizar</button></div><p class="muted">La carga se guarda en Base Local. La sincronización con Firebase la controla BL.</p></section>
<section class="excel-card"><h2>3. Resumen</h2><div class="excel-grid excel-grid-2"><div><h3>Esquema y análisis</h3><pre id="excel-schema-box">Esperando archivo...</pre></div><div><h3>Consolidado</h3><pre id="excel-summary-box">Sin consolidado.</pre></div></div></section>
<section class="excel-card"><h2>4. Borrado</h2><div class="excel-grid excel-grid-delete"><label>Período<select id="excel-delete-period-select"></select></label><div><span class="muted">Alumnos del período</span><strong id="excel-delete-students-count">—</strong></div><button id="excel-delete-students-btn" class="btn danger ghost" type="button">Borrar alumnos</button><button id="excel-delete-period-full-btn" class="btn danger" type="button" disabled>Borrar período completo</button></div></section>
<section class="excel-card"><h2>5. Historial</h2><pre id="excel-history">Sin historial local todavía.</pre></section>
</main>
<script src="excel-xlsx-loader.js"></script><script src="excel-constants.js"></script><script src="excel-state.js"></script><script src="excel-estados.js"></script><script src="excel-periodos.js"></script><script src="excel-reader.js"></script><script src="excel-logic.js"></script><script src="excel-resumen.logic.js"></script><script src="excel-performance.js"></script><script src="excel-monitor.js"></script><script src="excel-local/excel-local.config.js"></script><script src="excel-local/excel-local.storage.js"></script><script src="excel-local/excel-local.bridge.js"></script><script src="../../BaseLocal/services/bl-campos.js"></script><script src="../../BaseLocal/services/bl-normalizador.js"></script><script src="../../BaseLocal/services/bl-matricula.service.js"></script><script src="excel-local.repo.js"></script><script src="excel-save.service.js"></script><script src="excel-delete.service.js"></script><script src="excel-historial.repo.js"></script><script src="excel-estudiantes.repo.js"></script><script src="excel-bus.js"></script><script src="excel-ui.periodo.js"></script><script src="excel-ui.cargar.js"></script><script src="excel-ui.resumen.js"></script><script src="excel-ui.borrado.js"></script><script src="excel-ui.historial.js"></script><script src="excel-ui.js"></script>
<script>window.addEventListener("DOMContentLoaded",function(){try{if(window.ExcelLocalBridge)window.ExcelLocalBridge.ensureReady();if(window.ExcelUI&&typeof window.ExcelUI.boot==="function")window.ExcelUI.boot();if(window.ExcelBus&&typeof window.ExcelBus.boot==="function")window.ExcelBus.boot();}catch(error){console.error("[excel.html] Error de arranque",error);alert(error.message||"No se pudo iniciar el módulo Carga.");}});</script>
</body>
</html>
